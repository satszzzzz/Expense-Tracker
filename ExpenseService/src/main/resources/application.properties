spring.application.name=ExpenseService
server.port=8095

spring.kafka.topic.name=expense-data
spring.kafka.consumer.group-id=expense-consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:authService}?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
#spring.datasource.url=jdbc:mysql://localhost:3306/expenseService?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
#spring.jpa.properties.hibernate.hbm2ddl.auto=update

management.endpoints.web.exposure.include=health
management.health.kafka.enabled=true
